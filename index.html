<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commit Force</title>
<meta name="description" content="Point it at any GitHub repo and watch its issues, PRs & commits play out as a 16-bit gauntlet.">
<meta name="theme-color" content="#c92b2b">
<meta property="og:type" content="website">
<meta property="og:site_name" content="I Think This Is Fun">
<meta property="og:title" content="Commit Force - Fighting Evil one Pull Request at a time!">
<meta property="og:description" content="Point it at any GitHub repo and watch its issues, PRs & commits play out as a 16-bit gauntlet.">
<meta property="og:url" content="https://ithinkthisisfun.com/games/commit-force/">
<meta property="og:image" content="https://ithinkthisisfun.com/games/commit-force/og.png?v=2">
<meta property="og:image:width" content="640">
<meta property="og:image:height" content="364">
<meta property="og:image:alt" content="COMMIT FORCE — any GitHub repo, run as a 16-bit gauntlet">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Commit Force - Fighting Evil one Pull Request at a time!">
<meta name="twitter:description" content="Point it at any GitHub repo and watch its issues, PRs & commits play out as a 16-bit gauntlet.">
<meta name="twitter:image" content="https://ithinkthisisfun.com/games/commit-force/og.png?v=2">
<style>
  :root{ --red:#c92b2b; --red2:#e04a4a; --ink:#e7b7bd; --panel:#1a0e12; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#0a0608; color:var(--ink);
    font-family:"Courier New",monospace; display:flex; align-items:center; justify-content:center; }
  #card{ position:relative; z-index:1; width:min(560px,92vw); background:var(--panel); border:3px solid #2a1015;
    box-shadow:0 0 0 3px #000, 0 0 60px #000 inset; padding:26px 26px 22px; }
  h1{ margin:0 0 2px; font-size:37px; letter-spacing:3px; color:var(--red); text-shadow:3px 3px 0 #000, 0 0 18px rgba(201,43,43,.5); }
  .sub{ margin:0 0 18px; font-size:12px; color:#c7b3b8; letter-spacing:2px; }
  label{ display:block; font-size:11px; letter-spacing:1px; color:#c7b3b8; margin:14px 0 5px; }
  input,select{ width:100%; padding:11px 12px; background:#0c0709; color:#ffd; border:2px solid #3a1620; font-family:inherit; font-size:16px; letter-spacing:1px; outline:none; }
  select{ font-size:14px; padding:10px 12px; }
  select:disabled{ color:#6a5a5f; }
  input:focus,select:focus{ border-color:var(--red); }
  #bg{ position:fixed; inset:0; width:100%; height:100%; border:0; opacity:.82; filter:saturate(1) brightness(.95); pointer-events:none; z-index:0; }
  #veil{ position:fixed; inset:0; background:rgba(10,6,8,.28); pointer-events:none; z-index:0; }
  .row{ display:flex; gap:12px; } .row>div{ flex:1; }
  small{ color:#c7b3b8; font-size:10px; } small a{ color:#c7b3b8; }
  #suggest{ margin-top:7px; font-size:12px; padding:8px 10px; color:#c7b3b8; }
  #suggest option{ color:#ffd; }
  button{ margin-top:20px; width:100%; padding:13px; background:var(--red); color:#fff; border:none; font-family:inherit; font-size:17px; letter-spacing:3px; cursor:pointer; text-shadow:1px 1px 0 #000; box-shadow:0 4px 0 #7a1a1a; }
  button:hover{ background:var(--red2); } button:active{ transform:translateY(3px); box-shadow:0 1px 0 #7a1a1a; } button:disabled{ background:#4a2530; box-shadow:0 4px 0 #2a1015; cursor:default; }
  .repobar{ display:flex; gap:8px; align-items:stretch; }
  .repobar input{ flex:1; width:auto; }
  #check{ margin:0; flex:none; width:48px; padding:0; font-size:22px; line-height:1; letter-spacing:0; background:#3a1620; box-shadow:0 4px 0 #1a0c10; }
  #check:hover{ background:var(--red); } #check:active{ transform:translateY(3px); box-shadow:0 1px 0 #1a0c10; }
  #shareTop{ position:absolute; top:12px; right:12px; z-index:3; width:32px; height:32px; margin:0; padding:0;
    display:flex; align-items:center; justify-content:center; background:#2a1015; color:#e7b7bd; border:2px solid #5a2530; box-shadow:none; }
  #shareTop:hover{ background:var(--red); color:#fff; border-color:var(--red2); }
  #shareTip{ position:absolute; top:48px; right:12px; z-index:3; font-size:10px; letter-spacing:1px;
    background:rgba(10,6,8,0.92); border:1px solid #3a6a45; padding:3px 7px; opacity:0; transition:opacity .2s;
    pointer-events:none; white-space:nowrap; max-width:calc(100% - 24px); overflow:hidden; text-overflow:ellipsis; }
  #bar{ margin-top:22px; height:16px; background:#0c0709; border:2px solid #3a1620; display:none; }
  #fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--red),var(--red2)); transition:width .18s; }
  #statusrow{ margin-top:8px; min-height:16px; display:flex; align-items:center; gap:8px; }
  #status{ font-size:12px; color:#c7b3b8; letter-spacing:1px; }
  #spin{ display:none; width:12px; height:12px; flex:none; border:2px solid #4a2530; border-top-color:var(--red2); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #err{ margin-top:10px; color:var(--red2); font-size:12px; min-height:14px; }
  #warn{ margin-top:6px; color:#e6c36a; font-size:11px; min-height:13px; }
  .note{ margin-top:14px; font-size:11px; color:#c7b3b8; line-height:1.55; }
  .note a{ color:#c7b3b8; }
  .help{ display:inline-block; width:13px; height:13px; line-height:12px; text-align:center; border:1px solid #7a3038; border-radius:50%; color:#d59aa2; font-size:9px; cursor:pointer; margin-left:5px; vertical-align:middle; user-select:none; }
  .help:hover{ border-color:var(--red2); color:#fff; }
  .tip{ position:fixed; z-index:20; max-width:250px; background:#241016; border:2px solid var(--red); color:#eaddd0; font-size:11px; line-height:1.5; padding:9px 11px; box-shadow:0 6px 20px #000; }
</style>
</head>
<body>
<iframe id="bg" src="play.html?bg=1" tabindex="-1" scrolling="no" aria-hidden="true"></iframe>
<div id="veil"></div>
<div id="card">
  <button id="shareTop" type="button" title="copy a share link with these options" aria-label="share these options"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V3"/><path d="M8 6.5 12 3l4 3.5"/><path d="M7 11H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-1"/></svg></button>
  <div id="shareTip"></div>
  <h1>COMMIT FORCE</h1>
  <p class="sub">RUN A REPO'S ISSUE LOG AS A 16-BIT GAUNTLET</p>

  <label>GITHUB REPO <span class="help" data-help="Any public GitHub repo, as owner/name (a full https URL works too). Your browser reads it straight from GitHub — nothing is sent to this site's server.">?</span></label>
  <div class="repobar">
    <input id="repo" placeholder="owner/name" autofocus spellcheck="false" autocomplete="off">
    <button id="check" type="button" title="look up this repo" aria-label="look up this repo">›</button>
  </div>
  <select id="suggest" title="popular &amp; trending repos to try"><option value="" selected>★ suggested repos…</option></select>

  <label>COMMIT BRANCH <span class="help" data-help="Stars are the commits from ONE branch. Pick the branch where the work happened — otherwise a repo whose activity lived on a side branch shows no stars at all. Issues and PRs are repo-wide, so they're unaffected.">?</span></label>
  <select id="branch" disabled><option>—</option></select>

  <label>DATE RANGE <span class="help" data-help="Read activity between these two dates. A tighter range shows EVERY issue/PR/commit in it; a wide range on a very busy repo hits the caps (500 commits / 150 issues / 150 PRs) and only shows the newest slice — the picker warns you first.">?</span></label>
  <div class="row">
    <div><input id="start" type="date" title="start date" aria-label="start date"></div>
    <div><input id="end" type="date" title="end date" aria-label="end date"></div>
  </div>

  <button id="go">GO</button>
  <div id="bar"><div id="fill"></div></div>
  <div id="statusrow"><span id="status"></span><span id="spin"></span></div>
  <div id="err"></div>
  <div id="warn"></div>
  <div class="note">GitHub allows ~60 requests/hour per IP (a few builds); if you hit that, wait a few minutes. Source is <a href="https://github.com/ithinkthisisfun/commit-force" target="_blank" rel="noreferrer">public on GitHub</a>.</div>
  <div class="note">Got a saved level? <a href="#" id="loadlink">Load a .json file</a> to replay it without touching GitHub.</div>
  <input id="loadfile" type="file" accept=".json,application/json" hidden>
</div>

<script type="module">
import { buildLevelFromGitHub, checkRepo, getBranches, getCounts, getSuggestedRepos, windowCounts, CAPS, RateLimitError } from "./gitboy-github.js";
import { normalizeRepo } from "./gitboy-core.js";
const $ = id => document.getElementById(id);
const repo=$("repo"), go=$("go"), bar=$("bar"), fill=$("fill"), status=$("status"), err=$("err"), check=$("check"), startInput=$("start"), endInput=$("end");
// DATE RANGE: default to the last year (end = today, start = a year ago); prefill from ?start/?end.
const DAY_MS = 86400000, isoDay = ms => new Date(ms).toISOString().slice(0, 10);
{ const q = new URLSearchParams(location.search);
  endInput.value = q.get("end") || isoDay(Date.now());
  startInput.value = q.get("start") || isoDay(Date.now() - 365 * DAY_MS); }
// [start, end] in ms; the end date is inclusive (whole day), so push it to the next midnight.
function winDates(){ const s = Date.parse(startInput.value), e = Date.parse(endInput.value);
  return { start: Number.isFinite(s) ? s : Date.now() - 365 * DAY_MS, end: Number.isFinite(e) ? e + DAY_MS : Date.now() }; }
// suggested-repos dropdown: seed with solid picks (works even when rate-limited), then
// fill from the Search API's "trending" (most-starred repos created recently)
const suggest = $("suggest");
const fmtStars = n => n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "k" : "" + n;
const addSug = (r, label) => { const o = document.createElement("option"); o.value = r; o.textContent = label || r; suggest.appendChild(o); };
["cli/cli", "sveltejs/svelte", "vitejs/vite"].forEach(r => addSug(r));
suggest.onchange = () => { const v = suggest.value; suggest.selectedIndex = 0; if (v) { repo.value = v; doCheck(); } };
const fillSuggest = list => { if (!list || !list.length) return; suggest.length = 1;   // drop seeds, keep placeholder
  for (const it of list) addSug(it.repo, it.repo + "   ★" + fmtStars(it.stars)); };
// cache the list for the session so it's fetched once, not on every load (saves a Search call)
const cachedSuggest = (() => { try { return JSON.parse(sessionStorage.getItem("cf_suggest")); } catch { return null; } })();
if (cachedSuggest && cachedSuggest.length) fillSuggest(cachedSuggest);
else getSuggestedRepos().then(list => { if (!list.length) return; try { sessionStorage.setItem("cf_suggest", JSON.stringify(list)); } catch {} fillSuggest(list); }).catch(() => {});
repo.value = sessionStorage.getItem("gitboy_lastrepo") || "";
// shareable link: ?repo=owner/name&branch=main[&issues=N&commits=N] — prefill + auto-play
let autoShare = null;
{ const q = new URLSearchParams(location.search); const qr = (q.get("repo") || "").trim();
  if (qr) { repo.value = qr;
    autoShare = { branch: (q.get("branch") || "").trim() }; } }
// pull a branch out of a pasted /tree/<branch> URL (branch names may contain slashes)
const branchHint = s => { const m = (s || "").match(/github\.com[/:][^/]+\/[^/]+\/tree\/([^?#]+)/i); return m ? decodeURIComponent(m[1].replace(/\/+$/, "")) : ""; };
repo.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); (repoOk && branchesOk) ? start() : doCheck(); } });
go.onclick = start;

// help tooltips
const tip = document.createElement("div"); tip.className = "tip"; tip.style.display = "none"; document.body.appendChild(tip);
document.querySelectorAll(".help").forEach(h => { h.onclick = e => { e.stopPropagation();
  if (tip.style.display === "block" && tip._for === h) { tip.style.display = "none"; return; }
  tip.textContent = h.dataset.help; tip._for = h; tip.style.display = "block";
  const r = h.getBoundingClientRect();
  tip.style.left = Math.max(8, Math.min(innerWidth - 264, r.left - 8)) + "px";
  tip.style.top = (r.bottom + 8) + "px";
}; });
document.addEventListener("click", () => { tip.style.display = "none"; });

// two-step lookup, kicked off ON DEMAND (the › button / Enter / a demo link) — NOT on every
// keypress. (1) verify the repo exists (fast) -> (2) load branches with a spinner +
// "loading branches…", default-select the default branch -> enable GO. Issue/PR counts load
// in the background afterward and never gate GO. Rate-limit hits are reported under GO.
const branchSel = $("branch"), spin = $("spin");
let repoOk = false, branchesOk = false, checkSeq = 0, sizeOverride = false;
const setGo = () => { go.disabled = !(repoOk && branchesOk); };
go.disabled = true;
const rateMsg = e => `⏳ GitHub rate limit hit (60/hr) — try again in ~${Math.max(1, Math.round((e.resetMs - Date.now()) / 60000))} min`;
async function doCheck() {
  const auto = autoShare; autoShare = null;   // one-shot: a shared ?repo= link auto-plays on success
  const norm = normalizeRepo(repo.value.trim());
  repoOk = branchesOk = false; sizeOverride = false; go.textContent = "GO"; setGo();
  branchSel.innerHTML = ""; branchSel.disabled = true; err.textContent = ""; $("warn").textContent = "";
  if (!norm.includes("/") || norm.split("/").some(p => !p)) { spin.style.display = "none"; status.textContent = repo.value.trim() ? "enter a repo as owner/name" : ""; return; }
  const my = ++checkSeq;

  // step 1 — does the repo exist? (one fast request)
  status.textContent = "checking repo…"; spin.style.display = "inline-block";
  let info;
  try { info = await checkRepo(norm); }
  catch (e) {
    if (my !== checkSeq) return;
    spin.style.display = "none"; status.textContent = "";
    err.textContent = (e instanceof RateLimitError) ? rateMsg(e)
      : "✕ " + (/404|not found/i.test(e.message || "") ? "repo not found (or private)" : (e.message || "not found"));
    return;
  }
  if (my !== checkSeq) return;
  repoOk = true;

  // step 2 — load the branch list, default-select the repo's default branch
  status.textContent = "loading branches…";
  let branches;
  try { branches = await getBranches(norm, info.defaultBranch); }
  catch (e) {
    if (my !== checkSeq) return;
    spin.style.display = "none"; status.textContent = "";
    err.textContent = (e instanceof RateLimitError) ? rateMsg(e) : "✕ " + (e.message || e);
    return;
  }
  if (my !== checkSeq) return;
  branches.forEach(b => { const o = document.createElement("option"); o.value = b; o.textContent = b; branchSel.appendChild(o); });
  branchSel.value = info.defaultBranch; branchSel.disabled = false;
  branchesOk = true; spin.style.display = "none";
  // preselect: shared-link branch, else a branch from a pasted /tree/<branch> URL, else default
  let want = (auto && auto.branch) || "";
  if (!want) { const h = branchHint(repo.value);
    if (h) want = branches.includes(h) ? h : (branches.filter(b => h === b || h.startsWith(b + "/")).sort((a, b) => b.length - a.length)[0] || ""); }
  if (want && branches.includes(want)) branchSel.value = want;
  status.textContent = "repo ✓ · " + branches.length + " branch" + (branches.length !== 1 ? "es" : "");
  setGo(); syncUrl();

  // step 3 (background) — issue/PR heads-up; does not gate GO
  getCounts(norm).then(({ issues, prs }) => {
    if (my !== checkSeq || issues == null || prs == null) return;
    $("warn").textContent = (issues === 0 && prs === 0) ? "⚠ 0 issues & 0 PRs — you'll see commit-stars only"
      : issues === 0 ? "⚠ no issues → no trucks (planes & stars only)"
      : prs === 0 ? "⚠ no PRs → no planes" : "";
  }).catch(() => {});
}
check.onclick = doCheck;
// the shareable query, built from the current form selections (repo/branch/counts)
function shareParams() {
  const r = normalizeRepo(repo.value.trim()); const p = new URLSearchParams();
  if (r.includes("/")) { p.set("repo", r);
    if (branchesOk && branchSel.value && !branchSel.disabled) p.set("branch", branchSel.value);
    if (startInput.value) p.set("start", startInput.value);
    if (endInput.value) p.set("end", endInput.value); }
  return p;
}
// keep the address-bar URL in sync with the selections, so the PHONE's own Share
// button (and bookmark / copy-link / refresh) carry them — not just our in-app icon
const ogUrl = document.querySelector('meta[property="og:url"]');
function syncUrl() {
  const qs = shareParams().toString(), path = location.pathname + (qs ? "?" + qs : "");
  history.replaceState(null, "", path);
  // iOS Safari's Share sheet reads og:url, not the address bar — keep it current too
  if (ogUrl) ogUrl.setAttribute("content", location.origin + path);
}
branchSel.addEventListener("change", () => { sizeOverride = false; if (!busy) go.textContent = "GO"; syncUrl(); });
for (const el of [startInput, endInput]) el.addEventListener("change", () => { sizeOverride = false; if (!busy) go.textContent = "GO"; $("warn").textContent = ""; syncUrl(); });

// top-right in-app share icon: native share sheet (or clipboard) with these options
const shareTip = $("shareTip");
function flashTip(msg, col) { shareTip.textContent = msg; shareTip.style.color = col;
  shareTip.style.opacity = "1"; clearTimeout(shareTip._t); shareTip._t = setTimeout(() => shareTip.style.opacity = "0", msg.length > 30 ? 6000 : 1600); }
$("shareTop").onclick = async () => {
  const p = shareParams();
  if (!p.get("repo")) { flashTip("enter a repo first", "#e6c36a"); return; }
  const url = location.origin + location.pathname + "?" + p.toString();
  if (navigator.share) {                       // native share sheet (iOS/Android/modern desktop)
    try { await navigator.share({ title: "Commit Force", text: `Commit Force — ${p.get("repo")} as a 16-bit gauntlet`, url }); return; }
    catch (e) { if (e && e.name === "AbortError") return; }   // user cancelled; otherwise fall back to copy
  }
  let ok = true; try { await navigator.clipboard.writeText(url); } catch { ok = false; }
  flashTip(ok ? "link copied" : url, ok ? "#8fd8a0" : "#e6c36a");
};
// typing a new repo invalidates the current lookup (cheap, no network) — re-run with ›
repo.addEventListener("input", () => {
  repoOk = branchesOk = false; sizeOverride = false; go.textContent = "GO"; setGo();
  branchSel.innerHTML = ""; branchSel.disabled = true; err.textContent = ""; $("warn").textContent = "";
  status.textContent = repo.value.trim() ? "press › to look up" : "";
  syncUrl();
});
if (repo.value.trim()) doCheck();

let busy = false;
async function start(){
  if (busy || !(repoOk && branchesOk)) return;
  const r = repo.value.trim(), w = winDates(); err.textContent = "";
  if (w.end <= w.start) { err.textContent = "✕ end date must be after the start date"; return; }
  // size gate: how much does the picked range hold? Over the caps -> recommend a tighter range first.
  if (!sizeOverride) {
    busy = true; go.disabled = true; go.textContent = "CHECKING…"; $("warn").textContent = ""; status.textContent = "checking size…"; spin.style.display = "inline-block";
    let c;
    try { c = await windowCounts(r, w.start, w.end, branchSel.value); }
    catch (e) { spin.style.display = "none"; busy = false; go.disabled = false; go.textContent = "GO"; status.textContent = "";
      err.textContent = (e instanceof RateLimitError) ? rateMsg(e) : "✕ " + (e.message || e); return; }
    spin.style.display = "none"; busy = false; go.disabled = false;
    const over = [];
    if (c.commits != null && c.commits > CAPS.commits) over.push(c.commits.toLocaleString() + " commits");
    if (c.issues  != null && c.issues  > CAPS.issues)  over.push(c.issues.toLocaleString()  + " issues");
    if (c.prs     != null && c.prs     > CAPS.prs)     over.push(c.prs.toLocaleString()     + " PRs");
    if (over.length) {
      $("warn").textContent = "⚠ " + over.join(" · ") + " in this range — over the caps (" + CAPS.commits + " commits / " + CAPS.issues + " issues / " + CAPS.prs + " PRs). Tighten the range to see it ALL, or hit GO again to build the newest slice.";
      status.textContent = ""; sizeOverride = true; go.textContent = "GO ANYWAY"; return;
    }
  }
  busy = true; go.disabled = true; go.textContent = "LOADING…"; $("warn").textContent = ""; bar.style.display = "block"; fill.style.width = "3%"; status.textContent = "contacting github…";
  try {
    const level = await buildLevelFromGitHub(r, {
      branch: branchSel.value, start: w.start, end: w.end,
      onProgress: (p, m) => { fill.style.width = Math.max(3, p) + "%"; if (m) status.textContent = m; },
    });
    sessionStorage.setItem("gitboy_lastrepo", level.repo);
    sessionStorage.setItem("GITBOY_LEVEL", JSON.stringify(level));
    fill.style.width = "100%";
    if (level.commitsError) {
      status.textContent = `${level.counts.total} trucks · ${level.span.days}-day window`;
      $("warn").textContent = "⚠ " + level.commitsError + " — starting without the commit-stars";
    } else {
      status.textContent = `${level.counts.total} trucks · ${level.counts.commits} commits · ${level.span.days}-day window`;
    }
    setTimeout(() => { location.href = "play.html"; }, level.commitsError ? 2200 : 400);
  } catch (e) {
    err.textContent = (e instanceof RateLimitError) ? rateMsg(e) : "✕ " + (e.message || e);
    reset();
  }
}
function reset(){ busy = false; go.disabled = !(repoOk && branchesOk); go.textContent = sizeOverride ? "GO ANYWAY" : "GO"; }

// load a saved level file straight into the player -- bypasses GitHub entirely
const loadfile = $("loadfile"), loadlink = $("loadlink");
loadlink.onclick = e => { e.preventDefault(); loadfile.click(); };
loadfile.onchange = async () => {
  const f = loadfile.files[0]; if (!f) return; err.textContent = "";
  try {
    const level = JSON.parse(await f.text());
    if (!level || !Array.isArray(level.obstacles) || !Array.isArray(level.heroes) || !level.counts) throw new Error("not a Commit Force level file");
    sessionStorage.setItem("gitboy_lastrepo", level.repo || "");
    sessionStorage.setItem("GITBOY_LEVEL", JSON.stringify(level));
    status.textContent = "loaded " + (level.repo || "level") + " — starting…";
    location.href = "play.html";
  } catch (ex) { err.textContent = "✕ " + (ex.message || "could not read that file"); loadfile.value = ""; }
};
</script>
</body>
</html>
